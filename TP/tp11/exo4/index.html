<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style.css">
    <script src="./script/script.js"></script>
</head>
<body>
    <!-- <div id="conteneur-calendrier"></div> -->

    <div class="container">
    <!-- FORMULAIRE -->
    <div class="form-panel">
        <h2>Paramètres</h2>
        
        <div class="form-group">
            <label>Année</label>
            <input type="number" id="annee" value="2025" oninput="actualiser()">
        </div>

        <div class="form-group">
            <label>Mois</label>
            <select id="mois" onchange="actualiser()">
                <option value="1">Janvier</option>
                <option value="2">Février</option>
                <option value="3">Mars</option>
                <option value="4">Avril</option>
                <option value="5" selected>Mai</option>
                <option value="6">Juin</option>
                <option value="7">Juillet</option>
                <option value="8">Août</option>
                <option value="9">Septembre</option>
                <option value="10">Octobre</option>
                <option value="11">Novembre</option>
                <option value="12">Décembre</option>
            </select>
        </div>

        <div class="form-group">
            <label>Taille</label>
            <select id="taille" onchange="actualiser()">
                <option value="petit">Petit</option>
                <option value="moyen" selected>Moyen</option>
                <option value="grand">Grand</option>
            </select>
        </div>

        <div class="form-group">
            <label>Couleur Fond</label>
            <input type="color" id="couleurFond" value="#ffffff" oninput="actualiser()">
        </div>

        <div class="form-group">
            <label>Couleur Texte</label>
            <input type="color" id="couleurTexte" value="#333333" oninput="actualiser()">
        </div>
    </div>

    <!-- ZONE D'AFFICHAGE -->
    <div class="preview-panel">
        <h2>Aperçu du Calendrier</h2>
        <div id="render-zone"></div>
    </div>
</div>
</body>
<script>
    actualiser();
</script>
</html>
